name: Deploy To ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ecs-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}

      - name: Add known_hosts
        env:
          ECS_KNOWN_HOSTS: ${{ secrets.ECS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$ECS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes "${ECS_USER}@${ECS_HOST}" << 'EOF'
            set -euo pipefail
            cd /opt/sales-app/app
            sudo bash deploy/linux/release.sh main
          EOF
