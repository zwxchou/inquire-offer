name: Deploy To ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ecs-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ECS_HOST
    env:
      ECS_HOST: ${{ secrets.ECS_HOST || vars.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER || vars.ECS_USER }}
      ECS_KNOWN_HOSTS: ${{ secrets.ECS_KNOWN_HOSTS || vars.ECS_KNOWN_HOSTS }}
      ECS_SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY || secrets.ECS_SSH_KEY || vars.ECS_SSH_PRIVATE_KEY || vars.ECS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy inputs
        run: |
          set -euo pipefail
          [ -n "${ECS_HOST:-}" ] || (echo "Missing ECS_HOST" && exit 1)
          [ -n "${ECS_USER:-}" ] || (echo "Missing ECS_USER" && exit 1)
          [ -n "${ECS_SSH_PRIVATE_KEY:-}" ] || (echo "Missing ECS_SSH_PRIVATE_KEY/ECS_SSH_KEY" && exit 1)

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_INPUT="$(printf '%s' "${ECS_SSH_PRIVATE_KEY}" | sed 's/\r//g')"
          if printf '%s' "${KEY_INPUT}" | grep -q "BEGIN .*PRIVATE KEY"; then
            # Supports both real newlines and escaped "\n" in GitHub secrets/vars.
            printf '%b\n' "${KEY_INPUT}" > ~/.ssh/id_deploy
          else
            printf '%s' "${KEY_INPUT}" | base64 -d > ~/.ssh/id_deploy
          fi
          chmod 600 ~/.ssh/id_deploy
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null

      - name: Add known_hosts
        run: |
          set -euo pipefail
          if [ -n "${ECS_KNOWN_HOSTS:-}" ]; then
            echo "$ECS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$ECS_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH connectivity
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "${ECS_USER}@${ECS_HOST}" \
            "echo SSH_OK && whoami && hostname"

      - name: Pack release
        run: |
          set -euo pipefail
          tar -czf sales-release.tar.gz \
            --exclude ".git" \
            --exclude "__pycache__" \
            --exclude ".venv" \
            --exclude "*.pyc" \
            --exclude "sales.db" \
            --exclude "backups" \
            --exclude "customer_cards" \
            .

      - name: Upload release
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes sales-release.tar.gz "${ECS_USER}@${ECS_HOST}:/tmp/sales-release.tar.gz"

      - name: Deploy on ECS
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes "${ECS_USER}@${ECS_HOST}" << 'EOF'
            set -euo pipefail
            REMOTE_APP_DIR="/opt/sales-app/app"
            REMOTE_TEMP_DIR="/tmp"
            APP_SERVICE="sales-app"
            NGINX_SERVICE="nginx"
            HEALTH_URL="http://127.0.0.1:5173/healthz"
            RELEASE_ID="$(date +%Y%m%d_%H%M%S)"
            REMOTE_EXTRACT_DIR="${REMOTE_TEMP_DIR}/sales-release-${RELEASE_ID}"
            REMOTE_BACKUP_DIR="${REMOTE_TEMP_DIR}/sales-backup-${RELEASE_ID}"

            mkdir -p "${REMOTE_APP_DIR}"
            rm -rf "${REMOTE_EXTRACT_DIR}" "${REMOTE_BACKUP_DIR}"
            mkdir -p "${REMOTE_EXTRACT_DIR}" "${REMOTE_BACKUP_DIR}"

            rsync -a "${REMOTE_APP_DIR}/" "${REMOTE_BACKUP_DIR}/"
            tar -xzf "${REMOTE_TEMP_DIR}/sales-release.tar.gz" -C "${REMOTE_EXTRACT_DIR}"
            rsync -av --delete \
              --exclude "sales.db" \
              --exclude "backups/" \
              --exclude "customer_cards/" \
              "${REMOTE_EXTRACT_DIR}/" "${REMOTE_APP_DIR}/"

            chown -R salesapp:salesapp "${REMOTE_APP_DIR}" || true
            systemctl daemon-reload
            systemctl restart "${APP_SERVICE}"
            systemctl restart "${NGINX_SERVICE}"

            OK=0
            for i in 1 2 3 4 5; do
              if curl -fsS "${HEALTH_URL}" >/dev/null; then
                OK=1
                break
              fi
              sleep 2
            done

            if [ "${OK}" -ne 1 ]; then
              echo "Health check failed, rollback..."
              rsync -a --delete "${REMOTE_BACKUP_DIR}/" "${REMOTE_APP_DIR}/"
              systemctl restart "${APP_SERVICE}" || true
              systemctl restart "${NGINX_SERVICE}" || true
              exit 1
            fi

            rm -rf "${REMOTE_EXTRACT_DIR}" "${REMOTE_BACKUP_DIR}"
            rm -f "${REMOTE_TEMP_DIR}/sales-release.tar.gz"
          EOF
